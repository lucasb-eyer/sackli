name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  python-314t-posix:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    env:
      TEST_TMPDIR: ${{ github.workspace }}/test_tmpdir
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14t"
          cache: pip

      - name: Verify free-threaded interpreter
        run: |
          python - <<'PY'
          import sys
          import sysconfig

          print(sys.version)
          print("Py_GIL_DISABLED =", sysconfig.get_config_var("Py_GIL_DISABLED"))
          assert sysconfig.get_config_var("Py_GIL_DISABLED") == 1
          PY

      - name: Install build and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            scikit-build-core setuptools_scm \
            cmake ninja pytest absl-py numpy

      - name: Install sackli without cloud filesystems
        run: |
          python -m pip install -e . --no-build-isolation \
            --config-settings=cmake.args=-DSACKLI_ENABLE_GCS=OFF \
            --config-settings=cmake.args=-DSACKLI_ENABLE_S3=OFF

      - name: Run Python tests
        run: python -m pytest -q src/python/sackli_test.py
